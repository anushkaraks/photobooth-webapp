<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anushka's Photobooth</title>

  <!-- Favicon -->
  <link rel="icon" href="Assets/space-photobooth/favicon.png" type="image/x-icon" />

  <!-- Styles -->
  <link rel="stylesheet" href="StyleSheets/home.css" />
</head>

<body>

  <!-- Logo -->
  <div class="logo">
    <img src="Assets/space-photobooth/logo-new.png" alt="Anushka's Photobooth Logo">
  </div>

  <!-- Main Container -->
  <div class="home-container">
    
    <div class="photobooth-container">
      <div class="photobooth-mock"></div>
      <div class="photostrip-mock"></div>
      <div class="stars-mock"></div>
      <div class="character-mock-1"></div>
      <div class="character-mock-2"></div>
      <div class="character-mock-3"></div>
    </div>

    <div class="button-container">
      <button id="select-button">Select</button>
    </div>

  </div>

  <!-- JS -->
  <script src="Javascripts/home.js"></script>

</body>
</html>
